<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volatile Bandit — Leaderboard</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #7d8590; --accent: #58a6ff;
    --gold: #f0c040; --silver: #c0c0c0; --bronze: #cd7f32;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); padding: 2rem; line-height: 1.5;
  }
  h1 { font-size: 1.6rem; margin-bottom: .25rem; }
  .subtitle { color: var(--muted); margin-bottom: 1.5rem; font-size: .9rem; }
  .controls { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  input[type="search"] {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: .5rem .75rem; border-radius: 6px; font-size: .875rem; width: 260px;
  }
  input[type="search"]::placeholder { color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  thead th {
    text-align: left; padding: .6rem .75rem; border-bottom: 2px solid var(--border);
    color: var(--muted); font-weight: 600; cursor: pointer; user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted::after { content: " ▼"; font-size: .7em; }
  thead th.sorted.asc::after { content: " ▲"; font-size: .7em; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--surface); }
  td { padding: .55rem .75rem; white-space: nowrap; }
  .rank { font-weight: 700; width: 3rem; text-align: center; }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: .8rem; }
  .score { font-weight: 600; color: var(--accent); }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Volatile Bandit — Leaderboard</h1>
<p class="subtitle">Scores update automatically on every push. Ranked by cumulative reward on the holdout simulator.</p>

<div class="controls">
  <input type="search" id="filter" placeholder="Filter by branch, policy, or commit…">
</div>

<table>
  <thead>
    <tr>
      <th class="sorted" data-key="rank">#</th>
      <th data-key="branch">Branch</th>
      <th data-key="policy">Policy</th>
      <th data-key="score">Score</th>
      <th data-key="regret">Regret</th>
      <th data-key="commit">Commit</th>
      <th data-key="timestamp">Time</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>
<div class="empty" id="empty" hidden>No scores yet — push a branch to get started.</div>

<script>
const tbody = document.getElementById("rows");
const emptyEl = document.getElementById("empty");
const filterEl = document.getElementById("filter");
let data = [];

async function load() {
  const resp = await fetch("scores.json?" + Date.now());
  data = await resp.json();
  render(data);
}

function render(rows) {
  tbody.innerHTML = "";
  if (!rows.length) { emptyEl.hidden = false; return; }
  emptyEl.hidden = true;
  rows.forEach((r, i) => {
    const rank = i + 1;
    const tr = document.createElement("tr");
    const rankCls = rank <= 3 ? ` rank-${rank}` : "";
    const ts = r.timestamp ? new Date(r.timestamp).toLocaleString() : "";
    const shortSha = (r.commit || "").slice(0, 7);
    tr.innerHTML = `
      <td class="rank${rankCls}">${rank}</td>
      <td>${esc(r.branch)}</td>
      <td class="mono">${esc(r.policy)}</td>
      <td class="score">${num(r.score)}</td>
      <td>${num(r.regret)}</td>
      <td class="mono">${shortSha}</td>
      <td style="color:var(--muted)">${esc(ts)}</td>`;
    tbody.appendChild(tr);
  });
}

function num(v) { return v != null ? v.toLocaleString(undefined, {maximumFractionDigits: 2}) : "—"; }
function esc(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

filterEl.addEventListener("input", () => {
  const q = filterEl.value.toLowerCase();
  render(data.filter(r =>
    (r.branch || "").toLowerCase().includes(q) ||
    (r.policy || "").toLowerCase().includes(q) ||
    (r.commit || "").toLowerCase().includes(q)
  ));
});

load();
</script>
</body>
</html>
